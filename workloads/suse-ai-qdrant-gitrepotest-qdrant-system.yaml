{
  "apiVersion": "fleet.cattle.io/v1alpha1",
  "kind": "HelmOp",
  "metadata": {
    "name": "suse-ai-qdrant-gitrepotest-qdrant-system",
    "namespace": "fleet-local"
  },
  "spec": {
    "defaultNamespace": "qdrant-system",
    "helm": {
      "version": "1.16.3",
      "repo": "oci://registry.suse.com/ai/charts/qdrant",
      "releaseName": "suse-ai-qdrant-gitrepotest-qdrant-system",
      "values": {
        "additionalAnnotations": {},
        "additionalLabels": {},
        "additionalVolumeMounts": [],
        "additionalVolumes": [],
        "affinity": {},
        "args": [
          "./config/initialize.sh"
        ],
        "chartTests": {
          "dbInteraction": {
            "image": "registry.suse.com/bci/bci-base:latest",
            "resources": {
              "limits": {
                "cpu": "100m",
                "memory": "200Mi"
              },
              "requests": {
                "cpu": "100m",
                "memory": "200Mi"
              }
            }
          }
        },
        "config": {
          "cluster": {
            "consensus": {
              "tick_period_ms": 100
            },
            "enabled": true,
            "p2p": {
              "enable_tls": false,
              "port": 6335
            }
          },
          "service": {
            "enable_tls": false
          }
        },
        "containerSecurityContext": {
          "allowPrivilegeEscalation": false,
          "privileged": false,
          "readOnlyRootFilesystem": true,
          "runAsGroup": 2000,
          "runAsNonRoot": true,
          "runAsUser": 1000
        },
        "env": [],
        "fullnameOverride": "",
        "global": {
          "imagePullSecrets": [
            {
              "name": "suse-ai-pull-secret-dp-apps-rancher-io"
            },
            {
              "name": "suse-ai-pull-secret-registry-suse-com"
            }
          ],
          "imageRegistry": ""
        },
        "image": {
          "pullPolicy": "IfNotPresent",
          "registry": "registry.suse.com",
          "repository": "ai/containers/qdrant",
          "tag": "v1.16.3",
          "useUnprivilegedImage": false
        },
        "imagePullSecrets": [
          {
            "name": "suse-ai-pull-secret-dp-apps-rancher-io"
          },
          {
            "name": "suse-ai-pull-secret-registry-suse-com"
          }
        ],
        "ingress": {
          "additionalLabels": {},
          "annotations": {},
          "enabled": false,
          "hosts": [
            {
              "host": "example-domain.com",
              "paths": [
                {
                  "path": "/",
                  "pathType": "Prefix",
                  "servicePort": 6333
                }
              ]
            }
          ],
          "ingressClassName": "",
          "tls": []
        },
        "lifecycle": {
          "preStop": {
            "exec": {
              "command": [
                "sleep",
                "3"
              ]
            }
          }
        },
        "livenessProbe": {
          "enabled": false,
          "failureThreshold": 6,
          "initialDelaySeconds": 5,
          "periodSeconds": 5,
          "successThreshold": 1,
          "timeoutSeconds": 1
        },
        "metrics": {
          "serviceMonitor": {
            "additionalLabels": {},
            "authorization": {},
            "enabled": false,
            "metricRelabelings": [],
            "relabelings": [],
            "scrapeInterval": "30s",
            "scrapeTimeout": "10s",
            "targetPath": "/metrics",
            "targetPort": "http"
          }
        },
        "nameOverride": "",
        "nodeSelector": {},
        "persistence": {
          "accessModes": [
            "ReadWriteOnce"
          ],
          "additionalLabels": {},
          "annotations": {},
          "size": "10Gi",
          "storageClassName": "local-path"
        },
        "podAnnotations": {},
        "podDisruptionBudget": {
          "enabled": false,
          "maxUnavailable": 1,
          "unhealthyPodEvictionPolicy": ""
        },
        "podLabels": {},
        "podManagementPolicy": "Parallel",
        "podSecurityContext": {
          "fsGroup": 3000,
          "fsGroupChangePolicy": "Always"
        },
        "priorityClassName": "",
        "readinessProbe": {
          "enabled": true,
          "failureThreshold": 6,
          "initialDelaySeconds": 5,
          "periodSeconds": 5,
          "successThreshold": 1,
          "timeoutSeconds": 1
        },
        "replicaCount": 1,
        "resources": {},
        "service": {
          "additionalLabels": {},
          "annotations": {},
          "loadBalancerIP": "",
          "ports": [
            {
              "checksEnabled": true,
              "name": "http",
              "port": 6333,
              "protocol": "TCP",
              "targetPort": 6333
            },
            {
              "checksEnabled": false,
              "name": "grpc",
              "port": 6334,
              "protocol": "TCP",
              "targetPort": 6334
            },
            {
              "checksEnabled": false,
              "name": "p2p",
              "port": 6335,
              "protocol": "TCP",
              "targetPort": 6335
            }
          ],
          "type": "ClusterIP"
        },
        "serviceAccount": {
          "annotations": {}
        },
        "shareProcessNamespace": false,
        "sidecarContainers": [],
        "snapshotPersistence": {
          "accessModes": [
            "ReadWriteOnce"
          ],
          "additionalLabels": {},
          "annotations": {},
          "enabled": false,
          "size": "10Gi"
        },
        "snapshotRestoration": {
          "enabled": false,
          "mountPath": "/qdrant/snapshot-restoration",
          "pvcName": "snapshots-pvc",
          "snapshots": null
        },
        "startupProbe": {
          "enabled": false,
          "failureThreshold": 30,
          "initialDelaySeconds": 10,
          "periodSeconds": 5,
          "successThreshold": 1,
          "timeoutSeconds": 1
        },
        "tolerations": [],
        "topologySpreadConstraints": [],
        "updateVolumeFsOwnership": true
      },
      "disablePreProcess": true
    },
    "targets": [
      {
        "clusterName": "local"
      }
    ],
    "helmSecretName": "suse-ai-registry-auth"
  }
}